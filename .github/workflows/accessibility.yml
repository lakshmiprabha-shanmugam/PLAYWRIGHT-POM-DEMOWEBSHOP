name: Accessibility Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'tests/accessibility/**'   # only if accessibility files changed
  workflow_dispatch: # only manual, no automatic push trigger
  
jobs:
  accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        id: accessibility_tests
        run: npx playwright test --project=chromium --grep "@accessibility"
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-playwright-report-${{ github.run_number }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-allure-report-${{ github.run_number }}
          path: allure-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-allure-results-${{ github.run_number }}
          path: allure-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-junit-results-${{ github.run_number }}
          path: results.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: steps.accessibility_tests.outcome == 'failure'
        with:
          name: accessibility-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Add accessibility report summary
        if: always()
        run: |
          echo "## Accessibility Test Reports" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts for run **${{ github.run_number }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Contents |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`accessibility-playwright-report-${{ github.run_number }}\` | Playwright HTML report |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`accessibility-allure-report-${{ github.run_number }}\` | Allure HTML report |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`accessibility-allure-results-${{ github.run_number }}\` | Allure raw results |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Viewing reports locally" >> "$GITHUB_STEP_SUMMARY"
          echo "**Allure** — download + extract \`accessibility-allure-results-${{ github.run_number }}\`, then run:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "npx allure serve allure-results" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "> Do NOT open index.html directly — Allure requires an HTTP server to load its data files." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Playwright** — download + extract \`accessibility-playwright-report-${{ github.run_number }}\`, then run:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "npx playwright show-report playwright-report" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when accessibility tests fail
        if: steps.accessibility_tests.outcome == 'failure'
        run: exit 1
