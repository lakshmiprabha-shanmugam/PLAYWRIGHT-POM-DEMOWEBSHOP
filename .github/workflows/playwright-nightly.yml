# .github/workflows/playwright-nightly.yml
name: Playwright Nightly Regression

on:
  schedule:
    - cron: '0 0 * * *'    # Every night at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false      # Run all browsers even if one fails
      matrix:
        project: [chromium, chrome]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Clean allure results
        run: rm -rf allure-results

      - name: Run full regression
        id: regression_tests
        run: npm run test:allure -- --project=${{ matrix.project }}
        continue-on-error: true
        env:
          BASE_URL           : ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL    : ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD : ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ matrix.project }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 60

      - name: Upload nightly Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-allure-report-${{ matrix.project }}-${{ github.run_id }}
          path: allure-report/
          retention-days: 60

      - name: Upload nightly Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-allure-results-${{ matrix.project }}-${{ github.run_id }}
          path: allure-results/
          retention-days: 60

      - name: Upload nightly JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-junit-results-${{ matrix.project }}-${{ github.run_id }}
          path: results.xml
          retention-days: 60

      - name: Upload nightly test results on failure
        uses: actions/upload-artifact@v4
        if: steps.regression_tests.outcome == 'failure'
        with:
          name: nightly-test-results-${{ matrix.project }}-${{ github.run_id }}
          path: test-results/
          retention-days: 14

      - name: Add report artifact links
        if: always()
        run: |
          echo "## Nightly test reports - ${{ matrix.project }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: nightly-${{ matrix.project }}-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: nightly-allure-report-${{ matrix.project }}-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: nightly-allure-results-${{ matrix.project }}-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: nightly-junit-results-${{ matrix.project }}-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when tests fail
        if: steps.regression_tests.outcome == 'failure'
        run: exit 1
