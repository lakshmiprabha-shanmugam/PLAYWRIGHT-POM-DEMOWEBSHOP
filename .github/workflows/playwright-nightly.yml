# .github/workflows/playwright-nightly.yml
name: Playwright Nightly Regression

on:
  schedule:
    - cron: '0 0 * * *'    # Every night at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false      # Run all browsers even if one fails
      matrix:
        project: [chromium, chrome]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run full regression
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL           : ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL    : ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD : ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ matrix.project }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 60
