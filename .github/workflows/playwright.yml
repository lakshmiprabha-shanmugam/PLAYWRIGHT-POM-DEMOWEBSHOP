name: Playwright Smoke Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke_tests
        run: npm run test:smoke
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-${{ github.run_number }}
          path: results.xml
          retention-days: 30

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: steps.smoke_tests.outcome == 'failure'
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Add report artifact links
        if: always()
        run: |
          echo "## Test reports" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: playwright-report-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: allure-report-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: allure-results-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: junit-results-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when tests fail
        if: steps.smoke_tests.outcome == 'failure'
        run: exit 1

  accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        id: accessibility_tests
        run: npm run test:a11y:allure
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload accessibility Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload accessibility Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload accessibility Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

      - name: Upload accessibility JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-junit-results-${{ github.run_number }}
          path: results.xml
          retention-days: 30

      - name: Upload accessibility test results on failure
        uses: actions/upload-artifact@v4
        if: steps.accessibility_tests.outcome == 'failure'
        with:
          name: accessibility-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Add accessibility report artifact links
        if: always()
        run: |
          echo "## Accessibility test reports" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: accessibility-playwright-report-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: accessibility-allure-report-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: accessibility-allure-results-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: accessibility-junit-results-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when accessibility tests fail
        if: steps.accessibility_tests.outcome == 'failure'
        run: exit 1
